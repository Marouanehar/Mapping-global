<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil de Mapping & Consolidation d'Inventaire</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .file-input-group {
            flex: 1;
            min-width: 300px;
            background: var(--bg-color);
            padding: 20px;
            border: 1px dashed var(--secondary-color);
            border-radius: 6px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
        }
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            border: 1px solid var(--border-color);
            text-align: right;
        }
        th {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            position: sticky;
            top: 0;
        }
        td:first-child {
            text-align: left;
            font-weight: bold;
            background-color: #f1f3f5;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Consolidation d'Inventaire par Mapping</h1>
    
    <div class="upload-section">
        <div class="file-input-group">
            <label for="mappingFile">1. Fichier de Mapping (LISTE DES PRODUITS CHAR.csv)</label>
            <input type="file" id="mappingFile" accept=".csv">
        </div>
        
        <div class="file-input-group">
            <label for="inventoryFile">2. Fichier d'Inventaire (Résultats_Inventaire_CHARIOT.csv)</label>
            <input type="file" id="inventoryFile" accept=".csv">
        </div>
    </div>

    <button onclick="processFiles()">Générer le Tableau Consolidé</button>
    <div id="statusMessage" class="error"></div>

    <div class="table-responsive">
        <table id="resultTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Fonction utilitaire pour lire un fichier avec PapaParse
    function parseCSV(file) {
        return new Promise((resolve, reject) => {
            Papa.parse(file, {
                complete: results => resolve(results.data),
                error: err => reject(err),
                skipEmptyLines: true
            });
        });
    }

    async function processFiles() {
        const mappingFileInput = document.getElementById('mappingFile').files[0];
        const inventoryFileInput = document.getElementById('inventoryFile').files[0];
        const statusMessage = document.getElementById('statusMessage');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');

        statusMessage.textContent = "";
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        if (!mappingFileInput || !inventoryFileInput) {
            statusMessage.textContent = "Veuillez charger les deux fichiers CSV avant de lancer le calcul.";
            return;
        }

        try {
            const mappingData = await parseCSV(mappingFileInput);
            const inventoryData = await parseCSV(inventoryFileInput);

            // 1. Extraire le dictionnaire de Mapping
            const mappingDict = {};
            let mappingHeaderFound = false;
            let codeIdxMap = -1, mappingIdxMap = -1;

            for (let i = 0; i < mappingData.length; i++) {
                const row = mappingData[i];
                if (!mappingHeaderFound) {
                    // Recherche de l'entête
                    for (let j = 0; j < row.length; j++) {
                        if (row[j] && row[j].trim().toUpperCase() === 'CODE ARTICLE') codeIdxMap = j;
                        if (row[j] && row[j].trim().toUpperCase() === 'MAPPING') mappingIdxMap = j;
                    }
                    if (codeIdxMap !== -1 && mappingIdxMap !== -1) {
                        mappingHeaderFound = true;
                        continue;
                    }
                } else {
                    const code = row[codeIdxMap] ? row[codeIdxMap].trim() : null;
                    const mapName = row[mappingIdxMap] ? row[mappingIdxMap].trim() : null;
                    if (code && mapName) {
                        mappingDict[code] = mapName;
                    }
                }
            }

            // 2. Traiter le fichier d'inventaire
            let invHeaderRowIndex = -1;
            let invHeaders = [];
            
            // Trouver la ligne d'entête (qui contient 'Code')
            for (let i = 0; i < inventoryData.length; i++) {
                if (inventoryData[i][0] && inventoryData[i][0].trim() === 'Code') {
                    invHeaderRowIndex = i;
                    invHeaders = inventoryData[i];
                    break;
                }
            }

            if (invHeaderRowIndex === -1) {
                statusMessage.textContent = "Erreur: Impossible de trouver la colonne 'Code' dans le fichier d'inventaire.";
                return;
            }

            // 3. Consolider les données
            const consolidatedData = {};
            
            for (let i = invHeaderRowIndex + 1; i < inventoryData.length; i++) {
                const row = inventoryData[i];
                const itemCode = row[0] ? row[0].trim() : null;
                
                // Si le code existe dans notre mapping, on le traite. Sinon, on l'ignore (règle stricte).
                if (itemCode && mappingDict[itemCode]) {
                    const groupName = mappingDict[itemCode];
                    
                    // Initialiser le groupe s'il n'existe pas encore
                    if (!consolidatedData[groupName]) {
                        consolidatedData[groupName] = new Array(invHeaders.length).fill(0);
                        consolidatedData[groupName][0] = groupName; // Colonne Code/Nom
                    }

                    // Additionner les colonnes numériques (en sautant Code, Désignation, Nature, Pump)
                    for (let col = 1; col < row.length; col++) {
                        // Les colonnes de texte à ne pas sommer (Désignation, Nature, Pump)
                        if (col === 1 || col === 2 || col === 3) {
                            consolidatedData[groupName][col] = "-"; 
                            continue;
                        }
                        
                        // Parse de la valeur en remplaçant les virgules par des points pour les décimales
                        let valText = row[col] ? row[col].replace(',', '.') : '0';
                        let val = parseFloat(valText);
                        
                        if (!isNaN(val)) {
                            consolidatedData[groupName][col] += val;
                        }
                    }
                }
            }

            // 4. Générer l'affichage HTML
            
            // Création de l'entête
            let trHead = document.createElement('tr');
            invHeaders.forEach((header, index) => {
                let th = document.createElement('th');
                th.textContent = index === 0 ? 'Mapping (Article Global)' : header;
                trHead.appendChild(th);
            });
            tableHead.appendChild(trHead);

            // Création du corps du tableau
            for (const [groupName, rowData] of Object.entries(consolidatedData)) {
                let trBody = document.createElement('tr');
                rowData.forEach((cellData, index) => {
                    let td = document.createElement('td');
                    // Formatage des nombres à 2 décimales si c'est un flottant
                    if (typeof cellData === 'number' && index > 3) {
                        td.textContent = cellData.toFixed(2);
                    } else {
                        td.textContent = cellData;
                    }
                    trBody.appendChild(td);
                });
                tableBody.appendChild(trBody);
            }

        } catch (error) {
            statusMessage.textContent = "Une erreur s'est produite lors de la lecture des fichiers : " + error.message;
        }
    }
</script>

</body>
</html>
